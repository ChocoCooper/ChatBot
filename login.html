<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Assist AI - Login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-box { max-width: 440px; }
    .auth-form h2 { font-size: 1.4rem; margin-bottom: 1.2rem; }
    .input-group { margin-bottom: 0.85rem; }
    .input-group input { padding: 11px 42px 11px 45px; font-size: 0.95rem; }
    .password-strength { margin-top: 4px; display: flex; gap: 4px; }
    .strength-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--border-color); transition: background 0.3s; }
    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #10b981; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 0.4rem; }
    .auth-logo .material-symbols-rounded { font-size: 2rem; color: var(--primary-accent); }
    .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .show-pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--placeholder-color); font-size: 1.1rem; background: none; border: none; padding: 0; font-family: 'Material Symbols Rounded'; }
    .show-pw-toggle:hover { color: var(--primary-accent); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 1rem 0 0.5rem; color: var(--subheading-color); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
  </style>
</head>
<body>
  <div id="auth-container" class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="auth-logo">
          <span class="material-symbols-rounded">health_and_safety</span>
          <h1>Health Assist</h1>
        </div>
        <p>Your personal AI health companion</p>
      </div>

      <form id="login-form" class="auth-form">
        <h2>Welcome Back</h2>
        <div class="input-group">
          <input type="text" id="login-identifier" placeholder="Email or Username" required autocomplete="username">
          <span class="material-symbols-rounded">person</span>
        </div>
        <div class="input-group" style="position:relative">
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
          <span class="material-symbols-rounded">lock</span>
          <button type="button" class="show-pw-toggle" data-target="login-password">visibility</button>
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Log In</button>
        <p id="login-error" class="error-msg"></p>
        <div class="divider">or</div>
        <p class="switch-text">Don't have an account? <span id="show-register">Sign Up</span></p>
      </form>

      <form id="register-form" class="auth-form hide">
        <h2>Create Account</h2>
        <div class="input-group">
          <input type="email" id="reg-email" placeholder="Email Address" required autocomplete="email">
          <span class="material-symbols-rounded">mail</span>
        </div>
        <div class="input-group">
          <input type="text" id="reg-username" placeholder="Choose a Username" required autocomplete="username">
          <span class="material-symbols-rounded">badge</span>
        </div>
        <div class="input-group" style="position:relative">
          <input type="password" id="reg-password" placeholder="Create Password" required autocomplete="new-password">
          <span class="material-symbols-rounded">lock</span>
          <button type="button" class="show-pw-toggle" data-target="reg-password">visibility</button>
        </div>
        <div class="password-strength" id="strength-bars">
          <div class="strength-bar" id="bar1"></div>
          <div class="strength-bar" id="bar2"></div>
          <div class="strength-bar" id="bar3"></div>
          <div class="strength-bar" id="bar4"></div>
        </div>
        <div class="input-group" style="margin-top:0.85rem; position:relative">
          <input type="password" id="reg-confirm-password" placeholder="Confirm Password" required autocomplete="new-password">
          <span class="material-symbols-rounded">lock_reset</span>
          <button type="button" class="show-pw-toggle" data-target="reg-confirm-password">visibility</button>
        </div>
        <button type="submit" class="auth-btn" id="register-btn">Create Account</button>
        <p id="reg-error" class="error-msg"></p>
        <div class="divider">or</div>
        <p class="switch-text">Already have an account? <span id="show-login">Log In</span></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
