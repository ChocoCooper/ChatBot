<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nearby Hospitals</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>

    <div class="layout-wrapper">
    <div class="pattern-overlay"></div>

    <button id="sidebar-toggle" class="sidebar-toggle">
      <span class="material-symbols-rounded">menu</span>
    </button>

    <aside class="sidebar glass-card">
      <div class="logo">
        <span class="logo-text">Health Assist</span>
        <span class="material-symbols-rounded">health_and_safety</span>
      </div>
      
      <ul class="nav-menu">
        <li class="menu-item" data-target="dashboard">
          <span class="material-symbols-rounded">home</span>
          <span class="menu-text">Home</span>
        </li>
        <li class="menu-item" data-target="chatbot">
          <span class="material-symbols-rounded">forum</span>
          <span class="menu-text">ChatBot</span>
        </li>
        <li class="menu-item active" data-target="hospitals">
          <span class="material-symbols-rounded">local_hospital</span>
          <span class="menu-text">Nearby Hospitals</span>
        </li>
        <li class="menu-item" data-target="support">
          <span class="material-symbols-rounded">contact_phone</span>
          <span class="menu-text">Contact Support</span>
        </li>
        <li class="menu-item" data-target="articles">
          <span class="material-symbols-rounded">newspaper</span>
          <span class="menu-text">Health News</span>
        </li>
      </ul>

      <div class="sidebar-footer">
        <button id="logout-btn" class="nav-btn" title="Log Out">
          <span class="material-symbols-rounded">logout</span>
          <span class="menu-text">Log Out</span>
        </button>
      </div>
    </aside>

    <div class="content-area map-layout">
        <div id="page-preloader">
            <div class="preloader-spinner"></div>
        </div>

    <header>
        <span class="material-symbols-rounded">local_hospital</span>
        <h1>Nearby Hospitals</h1>
    </header>

    <div id="map"></div>
    
    <button class="btn-locate" id="locateBtn" onclick="getLocation()">
        <span id="btnText">Find Nearby</span>
        <span class="material-symbols-rounded" id="btnIcon" style="font-size: 18px;">my_location</span>
        <div class="spinner" id="btnSpinner"></div>
    </button>

    <div class="container">
        <div id="listLoader" class="list-spinner"></div>
        
        <div id="placeholder-text">
            <span class="material-symbols-rounded">map</span>
            Tap the button to scan for nearby medical facilities
        </div>
        
        <div id="hospital-list" class="hospital-grid"></div>
    </div>
    
    </div> <!-- End content-area -->
    </div> <!-- End layout-wrapper -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, markersLayer, userMarker, radiusCircle;

        document.addEventListener('DOMContentLoaded', () => {
            // Defaulting to your area, Chennai
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([13.0827, 80.2707], 12);
            markersLayer = L.featureGroup().addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        });

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1); 
        }

        function toggleLoading(isLoading) {
            const btn = document.getElementById('locateBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnSpinner = document.getElementById('btnSpinner');
            const listLoader = document.getElementById('listLoader');
            const listDiv = document.getElementById('hospital-list');
            const placeholder = document.getElementById('placeholder-text');

            if(isLoading) {
                btn.disabled = true;
                btnText.innerText = "Searching...";
                btnIcon.style.display = "none";
                btnSpinner.style.display = "block";
                listLoader.style.display = "block";
                if(placeholder) placeholder.style.display = "none"; 
                listDiv.innerHTML = ""; 
            } else {
                btn.disabled = false;
                btnText.innerText = "Find Nearby";
                btnIcon.style.display = "block";
                btnSpinner.style.display = "none";
                listLoader.style.display = "none";
            }
        }

        function getLocation() {
            toggleLoading(true);
            navigator.geolocation.getCurrentPosition(
                (pos) => { startSearch(pos.coords.latitude, pos.coords.longitude); },
                (err) => { 
                    toggleLoading(false);
                    document.getElementById('placeholder-text').style.display = "flex";
                    alert("Please enable GPS/Location access to find hospitals."); 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        async function startSearch(lat, lon, attempt = 1) {
            const radius = 4000; 
            
            if(attempt === 1) {
                if(userMarker) map.removeLayer(userMarker);
                if(radiusCircle) map.removeLayer(radiusCircle);
                markersLayer.clearLayers();

                // Custom user marker for dark theme
                userMarker = L.circleMarker([lat, lon], {
                    radius: 8, fillColor: "#3b82f6", color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(map);

                radiusCircle = L.circle([lat, lon], { 
                    radius: radius, color: '#3b82f6', weight: 1, fillOpacity: 0.1 
                }).addTo(map);
                
                map.flyTo([lat, lon], 14);
            }

            const query = `[out:json][timeout:15];node["amenity"~"hospital|clinic"](around:${radius},${lat},${lon});out;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Retry");
                const data = await response.json();
                renderHospitals(data.elements, lat, lon);
                toggleLoading(false);
            } catch (error) {
                if(attempt < 3) {
                    setTimeout(() => startSearch(lat, lon, attempt + 1), 1000);
                } else {
                    toggleLoading(false);
                    document.getElementById('placeholder-text').style.display = "flex";
                    alert("Server busy. Please try again.");
                }
            }
        }

        function renderHospitals(hospitals, uLat, uLon) {
            const listDiv = document.getElementById('hospital-list');
            listDiv.innerHTML = ""; 

            if (hospitals.length === 0) {
                listDiv.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; color: var(--subheading-color); margin-top: 20px;">
                        <span class="material-symbols-rounded" style="font-size: 30px; opacity:0.5; margin-bottom:10px;">search_off</span>
                        <p>No medical facilities found within 4km.</p>
                    </div>`;
                return;
            }

            hospitals.forEach(h => {
                const name = h.tags.name || "Medical Clinic";
                const type = (h.tags.amenity || "clinic").toUpperCase();
                const dist = getDistance(uLat, uLon, h.lat, h.lon);
                
                // Add marker to map
                const marker = L.marker([h.lat, h.lon]).addTo(markersLayer).bindPopup(`<b>${name}</b>`);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div onclick="map.flyTo([${h.lat}, ${h.lon}], 16); marker.openPopup();" style="cursor: pointer;">
                        <h3>${name}</h3>
                        <p><span class="material-symbols-rounded">medical_services</span> ${type}</p>
                        <span class="distance-badge">${dist} km</span>
                    </div>
                    <a class="nav-link" href="https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}" target="_blank">
                        <span class="material-symbols-rounded" style="font-size: 18px;">directions</span>
                        Get Directions
                    </a>
                `;
                listDiv.appendChild(card);
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="sidebar.js"></script>
</body>

</html>
