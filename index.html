<!DOCTYPE html>
<html>
<body>
  <h1>Check Console for Models</h1>
  <script src="config.js"></script>
  <script>
    const API_KEY = CONFIG.API_KEY; 
    
    // This asks Google: "What models can I use?"
    const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;

    fetch(url)
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          console.error("API Error:", data.error.message);
          document.body.innerHTML += `<p style="color:red">${data.error.message}</p>`;
        } else {
          console.log("Your Available Models:", data.models);
          document.body.innerHTML += "<h3>Available Models (Check Console for details):</h3>";
          data.models.forEach(model => {
            // We only care about models that support "generateContent"
            if(model.supportedGenerationMethods.includes("generateContent")) {
                document.body.innerHTML += `<li>${model.name}</li>`;
            }
          });
        }
      })
      .catch(err => console.error("Network Error:", err));
  </script>
</body>
</html>
